{% extends 'base.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ===== Base + Background Animation ===== */
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #00c6ff, #6a11cb, #2575fc, #7f00ff);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            transition: background 0.4s;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== Card ===== */
        .register-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 18px 45px rgba(0,0,0,0.25);
            animation: slideFade 0.9s ease;
            position: relative;
            transition: background 0.4s, color 0.4s;
        }

        @keyframes slideFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glow Border */
        .register-card::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: linear-gradient(45deg, #00c6ff, #6a11cb);
            z-index: -1;
            filter: blur(12px);
            opacity: 0.5;
        }

        .register-card h3 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 25px;
        }

        /* ===== Inputs ===== */
        .form-control {
            border-radius: 10px;
            padding: 10px 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            transform: scale(1.02);
            box-shadow: 0 0 8px rgba(106, 17, 203, 0.4);
        }

        /* ===== Button ===== */
        .btn-primary {
            background: linear-gradient(to right, #2575fc, #6a11cb);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        /* ===== Theme Toggle ===== */
        #themeToggle {
            position: fixed;
            top: 15px;
            right: 15px;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            background: #000;
            color: #fff;
            font-size: 16px;
        }

        /* ===== Dark Mode ===== */
        .dark-mode {
            background: #121212 !important;
        }

        .dark-mode .register-card {
            background: #1f1f1f;
            color: white;
        }
    </style>
</head>

<body>

<!-- Theme Toggle -->
<button id="themeToggle">🌙</button>

<div class="register-card">
    <h3>User Login</h3>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger text-center">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post" id="registerForm">
        {% csrf_token %}
        <input class="form-control mb-3" name="username" placeholder="Username" required>
        <input class="form-control mb-3" name="email" placeholder="Email" required>
        <input class="form-control mb-3" name="password" type="password" placeholder="Password" required>

        <button type="submit" class="btn btn-primary w-100">
            <span id="btnText">Register</span>
            <span id="spinner" class="spinner-border spinner-border-sm d-none"></span>
        </button>
    </form>
</div>

<script>
    /* Loading spinner */
    document.getElementById("registerForm").addEventListener("submit", function () {
        document.getElementById("btnText").classList.add("d-none");
        document.getElementById("spinner").classList.remove("d-none");
    });

    /* Theme toggle */
    const toggle = document.getElementById("themeToggle");
    toggle.onclick = () => {
        document.body.classList.toggle("dark-mode");
        toggle.innerText = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
    };
</script>

</body>
</html>
{% endblock content %}
