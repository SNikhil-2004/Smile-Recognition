 {% extends 'users/userbase.html' %}
{% block content %}

<style>
    .training-results {
        max-width: 600px;
        margin: 40px auto;
        padding: 25px;
        background-color: #f5f5f5;
        border-radius: 15px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .training-results h2 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 20px;
    }

    .training-results p {
        font-size: 18px;
        color: #333;
        padding: 10px;
        border-left: 4px solid #3498db;
        background-color: #fff;
        margin-bottom: 10px;
    }

    .training-results p strong {
        color: #2980b9;
    }
</style>

<div class="training-results">
    <h2>Training Results</h2>
    <p><strong>Final Training Accuracy:</strong> {{ train_accuracy }}</p>
    <p><strong>Final Validation Accuracy:</strong> {{ val_accuracy }}</p>
</div>

{% endblock content %}
