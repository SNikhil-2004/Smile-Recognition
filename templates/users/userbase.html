{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Navbar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("{% static 'img/4.jpg' %}");
            padding-top: 50px;
        }
        .navbar {
            background: linear-gradient(to right, #6a11cb, #2575fc);
        }
        .navbar-brand, .nav-link {
            color: white !important;
            font-weight: 500;
            font-size: 18px;
        }
        .nav-link:hover {
            color: #ffdd57 !important;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg shadow">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Smile Detection</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="{%  url 'userhome' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'training' %}">Training</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'predictsmile' %}">Smile_detect</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'detect_SMILE' %}">Capture_smile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Optional: Main content -->
<div class="container mt-4">
    <!-- Your page content goes here -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
{% block content %}{% endblock content %}
</html>
