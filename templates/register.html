{% extends 'base.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ===== Animated Background ===== */
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #2193b0, #6dd5ed, #cc2b5e, #753a88);
            background-size: 400% 400%;
            animation: bgAnimate 12s ease infinite;
            padding: 15px;
        }

        @keyframes bgAnimate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== Registration Box (Glassmorphism) ===== */
        .registration-box {
            width: 100%;
            max-width: 540px;
            background: transparent;   /* 🔥 TRANSPARENCY */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 18px 45px rgba(0,0,0,0.25);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(35px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .registration-box h2 {
            text-align: center;
            font-weight: 800;
            margin-bottom: 28px;
            letter-spacing: 1px;
        }

        /* ===== Form Layout ===== */
        .form-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        /* ===== Label Design ===== */
        .form-row label {
            width: 170px;
            font-weight: 600;
            text-align: right;
            background: linear-gradient(to right, #2575fc, #6a11cb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
            transition: transform 0.3s ease;
        }

        .form-row:hover label {
            transform: translateX(-4px);
        }

        /* ===== Inputs ===== */
        .form-row .form-control {
            flex: 1;
            border-radius: 10px;
            border: 1px solid #ccc;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #6a11cb;
            box-shadow: 0 0 10px rgba(106,17,203,0.35);
            transform: scale(1.02);
        }

        /* ===== Password Strength ===== */
        .strength {
            margin-left: 184px;
            font-size: 13px;
            font-weight: 600;
        }

        .weak { color: #d32f2f; }
        .medium { color: #f9a825; }
        .strong { color: #2e7d32; }

        /* ===== Button ===== */
        .btn-primary {
            margin-left: 184px;
            width: calc(100% - 184px);
            border-radius: 12px;
            padding: 11px;
            font-weight: 700;
            background: linear-gradient(to right, #2575fc, #6a11cb);
            border: none;
            transition: transform 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        /* ===== Theme Toggle ===== */
        #themeToggle {
            position: fixed;
            top: 15px;
            right: 15px;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            background: #000;
            color: #fff;
            z-index: 10;
        }

        /* ===== Dark Mode ===== */
        .dark-mode {
            background: #121212 !important;
        }

        .dark-mode .registration-box {
            background: rgba(30, 30, 30, 0.8);
            color: #fff;
        }

        .dark-mode input {
            background: rgba(50, 50, 50, 0.9);
            color: #fff;
            border-color: #555;
        }

        /* ===== Mobile Fix ===== */
        @media (max-width: 576px) {
            .form-row {
                flex-direction: column;
                align-items: stretch;
            }

            .form-row label {
                width: 100%;
                text-align: left;
            }

            .strength,
            .btn-primary {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>

<body>

<button id="themeToggle">🌙</button>

<div class="registration-box">
    <h2>User Registration</h2>

    <form method="post" id="registerForm" novalidate>
        {% csrf_token %}

        <div class="form-row">
            <label>Full Name</label>
            {{ form.name }}
        </div>

        <div class="form-row">
            <label>Username</label>
            {{ form.username }}
        </div>

        <div class="form-row">
            <label>Password</label>
            {{ form.password }}
        </div>
        <div id="strengthText" class="strength"></div>

        <div class="form-row">
            <label>Confirm Password</label>
            {{ form.confirm_password }}
        </div>

        <div class="form-row">
            <label>Email</label>
            {{ form.mail }}
        </div>

        <div class="form-row">
            <label>Phone Number</label>
            {{ form.phone_number }}
        </div>

        <div class="form-row">
            <label>Address</label>
            {{ form.address }}
        </div>

        <button type="submit" class="btn btn-primary">
            <span id="btnText">Register</span>
            <span id="spinner" class="spinner-border spinner-border-sm d-none"></span>
        </button>
    </form>
</div>

<script>
    /* Spinner */
    registerForm.addEventListener("submit", () => {
        btnText.classList.add("d-none");
        spinner.classList.remove("d-none");
    });

    /* Password Strength */
    const pwd = document.getElementById("id_password");
    const strength = document.getElementById("strengthText");

    pwd.addEventListener("input", () => {
        const v = pwd.value;
        if (v.length < 6) {
            strength.textContent = "Weak password";
            strength.className = "strength weak";
        } else if (/[A-Z]/.test(v) && /[0-9]/.test(v)) {
            strength.textContent = "Strong password";
            strength.className = "strength strong";
        } else {
            strength.textContent = "Medium password";
            strength.className = "strength medium";
        }
    });

    /* Theme Toggle */
    themeToggle.onclick = () => {
        document.body.classList.toggle("dark-mode");
        themeToggle.innerText = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
    };
</script>

</body>
</html>
{% endblock content %}
